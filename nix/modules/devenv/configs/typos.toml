# Run `touch .envrc && direnv export json` to apply changes to the repository.

[default.extend-words]
# Upstream API name from openssh-sftp-client crate
clonable = "clonable"
# GraphQL NOT IN operator
nin = "nin"
# Linux keycode ALS_TOGGLE (Ambient Light Sensor)
als = "als"
# Linux kernel bond option num_grat_arp (gratuitous ARP)
grat = "grat"
# GOST R 34.11-94 — Russian cryptographic hash standard (DNSSEC digest type 3)
gost = "gost"
# TPM2 spec type names (TPMS_ECC_PARMS, TPMS_RSA_PARMS, TPMS_KEYEDHASH_PARMS)
parms = "parms"
# H.264 unsigned exp-Golomb coding notation ue(v)
ue = "ue"
# Rust flate2 crate (DEFLATE/gzip codec)
flate = "flate"
# Bash test operator -ot (older than)
ot = "ot"
# BRE = Basic Regular Expression (regex standard term)
bre = "bre"
# Rela = ELF relocation entry type (SHT_RELA, Elf64_Rela)
rela = "rela"
# Siz = ELF readelf output abbreviation (FileSiz, MemSiz)
Siz = "Siz"
# GIR = GObject Introspection Repository (GNOME build tool)
gir = "gir"
# restat = ninja build system keyword (re-stat output files)
restat = "restat"


[default]
extend-ignore-re = [
  # Mesa OpenGL-over-Vulkan driver
  "Zink",
  "Automattic",
  "Tre",
  "tre",
  "Importd",
  "importd",
  "Localed",
  "Iinclude",
  "localed",
  "OIF",
  "oif",
  "GOST",
  "Gost",
  # GNU tar upstream test names (tests/extrac*.at in tar-1.35)
  "extrac[0-9]+",
  "extrac\\*",
]

[default.extend-identifiers]
# GNU tar upstream test names (tests/extrac*.at in tar-1.35) — not typos.
extrac01 = "extrac01"
extrac02 = "extrac02"
extrac03 = "extrac03"
extrac04 = "extrac04"
extrac05 = "extrac05"
extrac06 = "extrac06"
extrac07 = "extrac07"
extrac08 = "extrac08"
extrac09 = "extrac09"
extrac10 = "extrac10"
extrac11 = "extrac11"
extrac12 = "extrac12"
extrac13 = "extrac13"
extrac14 = "extrac14"
extrac15 = "extrac15"
extrac16 = "extrac16"
extrac17 = "extrac17"
extrac18 = "extrac18"
extrac19 = "extrac19"
extrac20 = "extrac20"
extrac21 = "extrac21"
extrac22 = "extrac22"
extrac23 = "extrac23"
extrac24 = "extrac24"
extrac25 = "extrac25"

[files]
extend-exclude = [
  "web/wiki/core/i18n/locales/da/translation.json",
  "web/wiki-dioxus/src/i18n.rs",
  "nix/config/secrets/*.age",
  # Upstream compiler code with assembly mnemonics and domain-specific abbreviations
  "rust/gcc/src/",
  "rust/gcc/include/",
  # Auto-generated bash 5.3 help text (upstream wording triggers false positives)
  "rust/bash/src/builtins/help_data.rs",
]
ignore-hidden = false
