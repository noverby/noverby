when:
  - event: ["push"]
    branch: "**"

engine: nix

steps:
  - name: "Setup Nix"
    command: |
      mkdir -p $HOME/.config/nix
      echo "experimental-features = nix-command flakes ca-derivations dynamic-derivations recursive-nix" > $HOME/.config/nix/nix.conf
  - name: "Run git hooks"
    command: |
      printf '{"PWD":"%s"}' "$PWD" > .env
      nix develop .#default --override-input env path:$(realpath $PWD/.env) --command pre-commit run --all-files
