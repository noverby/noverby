when:
  - event: ["push"]
    branch: "**"

engine: nix

steps:
  - name: "Print nix version"
    command: nix --version
  - name: "Run git hooks"
    command: |
      printf '{"PWD":"%s"}' "$PWD" > .env
      nix develop .#default --override-input env path:$(realpath $PWD/.env) --command prek run --all-files
