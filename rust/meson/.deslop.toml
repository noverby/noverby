# deslop configuration for rust-meson build system.
#
# This is an interpreter/build system that inherently needs:
# - cross-module calls (indexed one file at a time)
# - reading build files into memory
# - string key comparisons
# - numeric casts for array indices

disabled_rules = [
  # deslop indexes one file at a time; cross-module calls appear as
  # "hallucinated" even though they compile fine.
  "hallucinated_import_call",

  # Build files and source files must be read into memory for processing.
  "rust_unbounded_read_to_string",

  # Filesystem checks before operations are inherent to a build system.
  "rust_check_then_open_path",

  # Meson dict keys like "name", "value", "key" are not secrets.
  "rust_secret_equality_compare",

  # HashMap default hasher is fine for a build system; performance is
  # dominated by subprocess calls, not hash lookups.
  "rust_hashmap_default_hasher",

  # Array/string length casts from usize to i64 are safe within
  # the range of realistic build files.
  "rust_narrowing_numeric_cast",

  # UTF-8 validation on command output is necessary and not a hot path
  # relative to subprocess execution.
  "rust_utf8_validate_hot_path",

  # Function names mirror the Meson API names they implement.
  "overlong_name",

  # lines() allocation per line is negligible compared to subprocess I/O.
  "rust_lines_allocate_per_line",

  # Prototype codebase uses unwrap() extensively for simplicity.
  "unwrap_in_non_test_code",

  # Build system writes are sequential and buffered at OS level.
  "rust_unbuffered_file_writes",

  # Match exhaustiveness uses unreachable!() for defensive programming.
  "unreachable_macro_leftover",

  # Rc<RefCell<>> is the domain model for shared mutable interpreter state.
  "rust_rc_refcell_domain_model",

  # Interior mutability fields are fundamental to the interpreter design.
  "rust_pub_interior_mutability_field",

  # Struct-of-arrays is not needed for build system data structures.
  "rust_aos_hot_path",

  # Release profile is configured; overflow checks are not critical.
  "rust_release_profile_missing_overflow_checks",

  # Public bool parameters are fine for build system API.
  "rust_public_bool_parameter_api",

  # Partial initialization patterns are intentional.
  "rust_partial_init_escape",

  # Large module files are acceptable for this project structure.
  "rust_oversized_module_file",

  # Option bag config pattern is intentional for build system options.
  "rust_option_bag_config",

  # mod.rs files are the standard Rust module pattern.
  "rust_mod_rs_catchall",

  # panic!() is used for internal errors in the interpreter.
  "panic_macro_leftover",
]
