# deslop configuration for rust-bzip2 compression tool.
#
# bzip2 inherently needs existence checks before opening (so we don't
# clobber output unless -f was given), cross-module calls that look
# "hallucinated" to single-file indexing, and sequential stdout/stdin
# locking. Disable rules that flag those patterns.

disabled_rules = [
  # deslop indexes one file at a time; cross-module calls (e.g.
  # compress::compress, decompress::decompress) appear as
  # "hallucinated" even though they compile fine.
  "hallucinated_import_call",

  # The stdout/stdin locking pairs are sequential I/O handles, not
  # async locks with a meaningful acquisition order.
  "rust_async_lock_order_cycle",

  # `process_file` carries its semantics in its parameters, not the
  # name.
  "generic_name",

  # bzip2 must stat the destination before open() so it refuses to
  # overwrite without -f. TOCTOU is inherent to the tool.
  "rust_check_then_open_path",

  # Struct field access in the parse_args loop is idiomatic for arg
  # parsing; splitting fields into locals would hurt readability.
  "rust_aos_hot_path",

  # Match arms in the extension-to-path mapping cover all validated
  # cases; the unreachable arm is now replaced with an error return.
  "unreachable_macro_leftover",

  # Release profile already enables LTO + strip; overflow-checks are
  # out of scope for a bzip2 wrapper around the bzip2 crate.
  "rust_release_profile_missing_overflow_checks",
]
