[package]
name = "systemd-journal-remote"
version = "0.1.0"
authors = ["Niclas Overby <niclas@overby.me>"]
edition = "2024"

[[bin]]
name = "systemd-journal-remote"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
libsystemd = { path = "../libsystemd" }
tiny_http = { version = "0.12", features = ["ssl-rustls"] }
