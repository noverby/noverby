[package]
name = "systemd-journal-gatewayd"
version = "0.1.0"
authors = ["Niclas Overby <niclas@overby.me>"]
edition = "2024"

[[bin]]
name = "systemd-journal-gatewayd"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
glob = "0.3"
libsystemd = { path = "../libsystemd" }
serde_json = "1.0"
tiny_http = { version = "0.12", features = ["ssl-rustls"] }
