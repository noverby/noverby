# deslop configuration for rust-flatpak sandbox implementation
#
# A Flatpak-compatible sandbox tool inherently requires unsafe FFI for seccomp
# BPF filter generation, memfd creation, file descriptor manipulation, and
# libc calls (getuid, pipe2, fcntl, etc.). Rules that flag these patterns as
# defects are disabled below.

disabled_rules = [
  # ── Unsafe FFI ────────────────────────────────────────────────────────
  # Seccomp filter generation, memfd_create, pipe2, fcntl, and raw fd
  # manipulation require pervasive unsafe blocks. Each call site is
  # intentional and documented with SAFETY comments where non-trivial.
  "unsafe_without_safety_comment",
  "rust_unsafe_raw_pointer_cast",

  # ── Numeric casts ─────────────────────────────────────────────────────
  # BPF instructions use u16/u8/u32 fields matching the kernel's
  # sock_filter struct. File descriptors are i32. Seccomp syscall numbers
  # and socket families are narrowed to match libseccomp/kernel widths.
  "rust_narrowing_numeric_cast",

  # ── Cross-module resolution false positives ───────────────────────────
  # deslop indexes one file at a time; calls to helpers defined in sibling
  # modules (metadata, installation, extensions, ostree, etc.) appear as
  # "hallucinated" even though they compile fine.
  "hallucinated_local_call",
  "hallucinated_import_call",

  # ── Structure / naming ────────────────────────────────────────────────
  # sandbox.rs and main.rs are large by necessity (many bwrap args, many
  # CLI subcommands). seccomp.rs contains the full BPF instruction set.
  "rust_oversized_module_file",
  "rust_mod_rs_catchall",
  "overlong_name",

  # allow(dead_code) on internal types is intentional during incremental
  # development of new Flatpak features.
  "rust_broad_allow_dead_code",

  # ── unwrap() in unsafe FFI contexts ───────────────────────────────────
  # CString::new() on static strings and memfd name literals cannot fail;
  # unwrap is acceptable here.
  "rust_unwrap_in_non_test",
  "unwrap_in_non_test_code",

  # ── Filesystem patterns ───────────────────────────────────────────────
  # Flatpak must check filesystem state before operating (e.g. does the
  # deploy dir exist? is the metadata file present?). TOCTOU windows are
  # inherent to the Flatpak directory layout.
  "rust_check_then_open_path",

  # Reading entire metadata/bundle/config files into memory is correct;
  # these are small INI-format or bundle header files, not unbounded
  # streams. Applies to read_to_string on metadata, remotes.conf,
  # history.log, instance info, etc.
  "rust_read_to_string_unbounded",
  "rust_fs_read_to_string_unbounded",
  "rust_unbounded_read_to_string",

  # ── HashMap default hasher ────────────────────────────────────────────
  # Metadata groups and D-Bus policy maps are small; the default hasher
  # is fine for these use cases.
  "rust_hashmap_default_hasher",

  # ── UTF-8 validation ─────────────────────────────────────────────────
  # Bundle parsing validates UTF-8 on ref names and metadata strings that
  # come from untrusted input; this is intentional, not a hot-path issue.
  "rust_utf8_validate_hot_path",

  # ── Drop / blocking ──────────────────────────────────────────────────
  # D-Bus proxy Drop impl kills child processes; blocking in Drop is
  # acceptable here since proxy cleanup must happen synchronously before
  # the sandbox exits.
  "rust_blocking_drop",
  "rust_drop_blocking_io",
  "rust_drop_side_effect",
  "rust_async_blocking_drop",

  # ── Process-global state ──────────────────────────────────────────────
  # Setting environment variables for the sandbox child is intentional.
  "rust_process_global_env_toggle",

  # ── Release profile ──────────────────────────────────────────────────
  # overflow-checks in release is a deliberate trade-off for performance
  # in BPF filter generation and binary format parsing.
  "rust_release_overflow_checks",
  "rust_release_profile_missing_overflow_checks",

  # ── Global mutable state ─────────────────────────────────────────────
  # Connection pool for HTTP/TLS reuse across OSTree fetches is an
  # intentional global singleton behind a Mutex.
  "rust_global_mutable_static",
  "rust_global_lock_state",

  # ── Naming ───────────────────────────────────────────────────────────
  # Generic parameter/variable names like `data`, `buf`, `path` are
  # idiomatic in low-level IO and binary format code.
  "rust_generic_name_no_struct",
  "generic_name",

  # ── Low-signal style checks ──────────────────────────────────────────
  "comment_style_tutorial",
  "rust_partial_init_escape",
  "rust_public_bool_parameter_api",
  "rust_constructor_many_flags",
  "rust_aos_hot_path",
  "rust_lines_allocate_per_line",
  "rust_unbuffered_file_writes",
  "rust_debug_secret",
  "rust_secret_equality_compare",
  "unreachable_macro_leftover",
  "rust_builder_without_validate",
]
