# deslop configuration for rust-bash shell implementation
#
# A POSIX-compatible shell inherently requires unsafe FFI, narrowing casts for
# exit codes/signals, process-global environment mutation, and cross-module
# helper calls that single-file indexing cannot resolve. Rules that flag these
# patterns as defects are disabled below.

disabled_rules = [
  # ── Cross-module resolution false positives ───────────────────────────
  # deslop indexes one file at a time; calls to helpers defined in sibling
  # modules appear as "hallucinated" even though they compile fine.
  "hallucinated_local_call",
  "hallucinated_import_call",

  # ── Shell-inherent patterns ───────────────────────────────────────────
  # A shell *must* mutate the process environment (cd, export, set, etc.).
  "rust_process_global_env_toggle",

  # Comparing variable names like "key", "secret", "token" is normal shell
  # string handling, not a credential-equality bug.
  "rust_secret_equality_compare",

  # ── Unsafe FFI ────────────────────────────────────────────────────────
  # Signal handling, libc calls (setrlimit, getrusage, execvp, chdir, …),
  # and raw fd manipulation require pervasive unsafe blocks. Each call site
  # is intentional; adding hundreds of SAFETY comments would be noise.
  "unsafe_without_safety_comment",
  "rust_unsafe_raw_pointer_cast",

  # ── Numeric casts ─────────────────────────────────────────────────────
  # Exit codes (i64 → i32), file descriptors, signal numbers, and rlimit
  # values are narrowed deliberately to match POSIX/libc widths.
  "rust_narrowing_numeric_cast",

  # ── Structure / naming ────────────────────────────────────────────────
  # Large AST and interpreter modules are expected in a parser/shell.
  "rust_oversized_module_file",
  "rust_mod_rs_catchall",
  "overlong_name",

  # allow(dead_code) on AST enums is intentional during incremental dev.
  "rust_broad_allow_dead_code",

  # ── Performance heuristics that don't apply ───────────────────────────
  # Struct-field deref in loops is idiomatic for interpreter eval loops.
  "rust_aos_hot_path",

  # .lines() is the standard way to iterate line-oriented shell data.
  "rust_lines_allocate_per_line",

  # Default hasher is fine for shell-scale hash maps.
  "rust_hashmap_default_hasher",

  # Shell builtins (echo, printf, type) write to stdout/stderr inside
  # loops by design; callers flush at the boundary.
  "rust_unbuffered_file_writes",

  # from_utf8 / from_utf8_lossy in the lexer/expand path is required.
  "rust_utf8_validate_hot_path",

  # ── Shell-inherent control flow ───────────────────────────────────────
  # Parser/interpreter match arms use unreachable!() for exhaustive
  # coverage of AST variants that cannot occur in a given context.
  "unreachable_macro_leftover",

  # A shell must stat/test paths before opening them (test -f, -d, etc.).
  # The TOCTOU window is inherent to POSIX shell semantics.
  "rust_check_then_open_path",

  # ── Low-signal style checks ──────────────────────────────────────────
  "comment_style_tutorial",
  "rust_partial_init_escape",
  "rust_public_bool_parameter_api",
  "rust_constructor_many_flags",
]
