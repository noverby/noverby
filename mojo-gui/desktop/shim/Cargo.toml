[package]
name = "mojo-blitz-shim"
version = "0.1.0"
edition = "2024"
rust-version = "1.90.0"
description = "C FFI shim exposing Blitz (HTML/CSS rendering engine) DOM operations for mojo-gui desktop renderer"
license = "MIT OR Apache-2.0"
publish = false

[lib]
name = "mojo_blitz"
crate-type = ["cdylib", "rlib"]

[dependencies]
# Blitz packages — pinned to v0.2.0 release
blitz = { git = "https://github.com/DioxusLabs/blitz", rev = "2f83df96220561316611ecf857e20cd1feed8ca0", features = [
  "net",
] }
blitz-dom = { git = "https://github.com/DioxusLabs/blitz", rev = "2f83df96220561316611ecf857e20cd1feed8ca0" }
blitz-html = { git = "https://github.com/DioxusLabs/blitz", rev = "2f83df96220561316611ecf857e20cd1feed8ca0" }
blitz-traits = { git = "https://github.com/DioxusLabs/blitz", rev = "2f83df96220561316611ecf857e20cd1feed8ca0" }
blitz-shell = { git = "https://github.com/DioxusLabs/blitz", rev = "2f83df96220561316611ecf857e20cd1feed8ca0" }
blitz-paint = { git = "https://github.com/DioxusLabs/blitz", rev = "2f83df96220561316611ecf857e20cd1feed8ca0" }

# Rendering backend (must match Blitz v0.2.0's pinned versions exactly)
anyrender = { version = "0.6" }
anyrender_vello = { version = "0.6" }

# Windowing (must match Blitz v0.2.0's pinned version exactly)
# Wayland-only: disable default features (which include x11 + wayland-dlopen).
# Note: blitz-shell still enables winit defaults transitively, so x11 code is
# compiled in but never used — we simply don't ship X11 runtime libraries.
winit = { version = "0.30", default-features = false, features = [
  "wayland",
  "wayland-csd-adwaita",
  "rwh_06",
] }

# Note: markup5ever types (QualName, LocalName, etc.) are re-exported by blitz-dom.
# Do NOT add a direct markup5ever dependency — version mismatches cause type errors.

[profile.release]
opt-level = 2
lto = "thin"
strip = "symbols"
