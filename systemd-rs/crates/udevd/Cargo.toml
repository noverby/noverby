[package]
name = "systemd-udevd"
version = "0.1.0"
authors = ["Niclas Overby <niclas@overby.me>"]
edition = "2024"

[lib]
name = "systemd_udevd"
path = "src/lib.rs"

[[bin]]
name = "systemd-udevd"
path = "src/main.rs"

[dependencies]
libc = "0.2"
log = "0.4"
nix = { version = "0.31", features = [
  "signal",
  "process",
  "fs",
  "net",
  "poll",
  "socket",
] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tempfile = "3"
