[package]
name = "udevadm"
version = "0.1.0"
authors = ["Niclas Overby <niclas@overby.me>"]
edition = "2024"

[[bin]]
name = "udevadm"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
libc = "0.2"
log = "0.4"
nix = { version = "0.31", features = [
  "signal",
  "process",
  "fs",
  "net",
  "socket",
] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tempfile = "3"
