[package]
name = "systemd-timesyncd"
version = "0.1.0"
authors = ["Niclas Overby <niclas@overby.me>"]
edition = "2024"

[[bin]]
name = "systemd-timesyncd"
path = "src/main.rs"

[dependencies]
zbus = "5"
libc = "0.2"
log = "0.4"
nix = { version = "0.31", features = ["signal", "process", "time"] }
rustls = { version = "0.23", default-features = false, features = [
  "std",
  "tls12",
  "ring",
] }
webpki-roots = "1"
aes-siv = "0.7"
aead = "0.5"
rand = "0.8"

[dev-dependencies]
tempfile = "3"
