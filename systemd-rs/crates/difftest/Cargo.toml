[package]
name = "difftest"
version = "0.1.0"
authors = ["Niclas Overby <niclas@overby.me>"]
edition = "2024"
description = "Differential testing framework for systemd-rs vs real systemd"

[dependencies]
difftest-macros = { path = "../difftest-macros" }
inventory = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
regex = "1.12"
chrono = "0.4"
quick-xml = { version = "0.37", features = ["serialize"] }
rayon = "1.10"
toml = "0.8"
log = "0.4"
thiserror = "2"

[dev-dependencies]
tempfile = "3"
